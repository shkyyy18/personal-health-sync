name: Bug report
description: Report a reproducible problem without personal health data
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: "Do not attach real records, tokens, QR codes, or account identifiers."
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version and platform
    validations:
      required: true
